# Catalog manifest 서명 — Phase 13'.g.2.d (ADR-0047).
#
# 정책:
# - main branch에 catalog.json 변경 push 시 자동 트리거.
# - rsign2 (zero-deps Rust)로 minisign 서명 생성.
# - .minisig 파일을 같은 commit에 자동 push (jsDelivr가 mirror하도록).
# - GitHub Releases tier도 동일 .minisig 동봉.
# - secret keypair: CATALOG_MINISIGN_SECRET_KEY (password-protected) + CATALOG_MINISIGN_PASSWORD.

name: Sign catalog

on:
  push:
    branches: [main]
    paths:
      - 'manifests/apps/catalog.json'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sign:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip-sign]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 자동 commit + push에 별도 token 필요 — branch protection이 없으면 GITHUB_TOKEN 사용 가능.
          # protection 있으면 personal access token (PAT)로 secrets.CI_PUSH_TOKEN 등록.
          token: ${{ secrets.CI_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install rsign2
        run: cargo install rsign2 --locked --quiet

      - name: Sign catalog.json
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.CATALOG_MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.CATALOG_MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::error::CATALOG_MINISIGN_SECRET_KEY secret이 설정되지 않았어요."
            exit 1
          fi
          # secret을 임시 파일로 — process substitution은 일부 환경에서 불안정.
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$MINISIGN_SECRET_KEY" > "$KEY_FILE"
          # password가 비어있으면 빈 문자열로 처리 — rsign2는 stdin password 지원.
          printf '%s' "${MINISIGN_PASSWORD:-}" | rsign sign \
            -s "$KEY_FILE" \
            -x manifests/apps/catalog.json.minisig \
            -t "LMmaster catalog signed at $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            manifests/apps/catalog.json
          echo "✅ Generated manifests/apps/catalog.json.minisig"

      - name: Verify signature self-check
        env:
          PUBKEY: ${{ secrets.CATALOG_MINISIGN_PUBKEY }}
        run: |
          set -euo pipefail
          if [ -n "${PUBKEY:-}" ]; then
            PUBKEY_FILE=$(mktemp)
            trap 'rm -f "$PUBKEY_FILE"' EXIT
            printf '%s' "$PUBKEY" > "$PUBKEY_FILE"
            rsign verify \
              -p "$PUBKEY_FILE" \
              -x manifests/apps/catalog.json.minisig \
              manifests/apps/catalog.json
            echo "✅ Signature verified against pubkey"
          else
            echo "::warning::CATALOG_MINISIGN_PUBKEY secret 미설정 — self-check skip."
          fi

      - name: Commit + push .minisig
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet manifests/apps/catalog.json.minisig; then
            echo "ℹ️ .minisig 변경 없음 — commit skip."
            exit 0
          fi
          git add manifests/apps/catalog.json.minisig
          git commit -m "ci(sign): re-sign catalog [skip-sign]" -m "Auto-generated by .github/workflows/sign-catalog.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          git push
          echo "✅ Pushed .minisig to main"
