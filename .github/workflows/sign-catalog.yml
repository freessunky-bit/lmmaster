# Manifest 서명 — Phase 13'.g.2.d (ADR-0047) + 13'.g.3 확장 (catalog 외 매니페스트).
#
# 정책:
# - main branch에 매니페스트 변경 push 시 자동 트리거.
#   - catalog.json (모델 카탈로그 — 13'.g.2)
#   - ollama.json / lm-studio.json (앱 매니페스트 — 13'.g.3 확장)
# - rsign2 (zero-deps Rust)로 minisign 서명 생성.
# - .minisig 파일을 같은 commit에 자동 push (jsDelivr가 mirror하도록).
# - GitHub Releases tier도 동일 .minisig 동봉.
# - secret keypair: CATALOG_MINISIGN_SECRET_KEY (password-protected) + CATALOG_MINISIGN_PASSWORD.
# - registry-fetcher의 verify 호출 측 통합은 v1.x 후속 (결정 노트 phase-13pg3-* §4 참조).
#   현재는 .minisig 파일을 *생성*만 — verify 측 fail-fast 통합은 별개 sub-phase.

name: Sign manifests

on:
  push:
    branches: [main]
    paths:
      - 'manifests/apps/catalog.json'
      - 'manifests/apps/ollama.json'
      - 'manifests/apps/lm-studio.json'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sign:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip-sign]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 자동 commit + push에 별도 token 필요 — branch protection이 없으면 GITHUB_TOKEN 사용 가능.
          # protection 있으면 personal access token (PAT)로 secrets.CI_PUSH_TOKEN 등록.
          token: ${{ secrets.CI_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install rsign2
        run: cargo install rsign2 --locked --quiet

      - name: Sign manifests (catalog + ollama + lm-studio)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.CATALOG_MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.CATALOG_MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            # v1.x 후속 — catalog signing keypair 등록 전. graceful skip(workflow는 success).
            # 사용자가 secret 등록하면 다음 main push부터 자동 서명.
            echo "::warning::CATALOG_MINISIGN_SECRET_KEY secret이 설정되지 않았어요. 서명 skip — v1.x 후속에 keypair 등록 후 활성."
            exit 0
          fi
          # secret을 임시 파일로 — process substitution은 일부 환경에서 불안정.
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$MINISIGN_SECRET_KEY" > "$KEY_FILE"
          # password 입력은 stdin 1회 — 여러 파일 사용 시 매 호출마다 같은 password 주입.
          # 변경된 매니페스트만 처리해도 되지만 단순화 위해 3종 모두 서명 (idempotent — 변경 없으면 .minisig도 byte-identical).
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          for manifest in catalog.json ollama.json lm-studio.json; do
            target="manifests/apps/$manifest"
            sig="$target.minisig"
            if [ ! -f "$target" ]; then
              echo "::warning::$target 미존재 — skip."
              continue
            fi
            printf '%s' "${MINISIGN_PASSWORD:-}" | rsign sign \
              -s "$KEY_FILE" \
              -x "$sig" \
              -t "LMmaster $manifest signed at $NOW" \
              "$target"
            echo "✅ Generated $sig"
          done

      - name: Verify signatures self-check
        env:
          PUBKEY: ${{ secrets.CATALOG_MINISIGN_PUBKEY }}
        run: |
          set -euo pipefail
          if [ -z "${PUBKEY:-}" ]; then
            echo "::warning::CATALOG_MINISIGN_PUBKEY secret 미설정 — self-check skip."
            exit 0
          fi
          PUBKEY_FILE=$(mktemp)
          trap 'rm -f "$PUBKEY_FILE"' EXIT
          printf '%s' "$PUBKEY" > "$PUBKEY_FILE"
          for manifest in catalog.json ollama.json lm-studio.json; do
            target="manifests/apps/$manifest"
            sig="$target.minisig"
            [ -f "$target" ] || continue
            [ -f "$sig" ] || { echo "::warning::$sig 미생성 — verify skip."; continue; }
            rsign verify \
              -p "$PUBKEY_FILE" \
              -x "$sig" \
              "$target"
            echo "✅ Verified $manifest against pubkey"
          done

      - name: Commit + push .minisig files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 3종 .minisig 모두 변경 검사. 하나라도 변경 시 single commit.
          changed=0
          for manifest in catalog.json ollama.json lm-studio.json; do
            sig="manifests/apps/$manifest.minisig"
            [ -f "$sig" ] || continue
            if ! git diff --quiet "$sig"; then
              git add "$sig"
              changed=1
            fi
          done
          if [ "$changed" -eq 0 ]; then
            echo "ℹ️ .minisig 변경 없음 — commit skip."
            exit 0
          fi
          git commit -m "ci(sign): re-sign manifests [skip-sign]" -m "Auto-generated by .github/workflows/sign-catalog.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          git push
          echo "✅ Pushed .minisig to main"
