# Phase 21'.d — Trending Watcher cron (DEPRECATED).
#
# ⚠️ DEPRECATED — production은 별도 repo `freessunky-bit/lmmaster-trending-watcher`
# (Phase 21'.a 신설, 2026-05-08). 본 prototype workflow는 *이중 실행 / Issue 중복 생성*
# 방지 위해 schedule 제거 + workflow_dispatch만 유지 (manual debug용).
#
# 별도 repo 운영 안정화 후 본 file 자체를 삭제. Phase R-I.4 (ADR-0064 §I, 2026-05-08) 갱신:
# objective gate — 별도 repo `freessunky-bit/lmmaster-trending-watcher`이 6h cron으로 4회 이상
# 정상 실행 + Issue 생성 1건 이상 검증되면 본 workflow + `crates/trending-watcher` prototype crate 삭제.
#
# 정책 (ADR-0059 §5) — 별도 repo로 이동:
# https://github.com/freessunky-bit/lmmaster-trending-watcher/.github/workflows/cron.yml

name: Trending Watcher (deprecated — see lmmaster-trending-watcher repo)

on:
  # schedule cron 제거 — 별도 repo가 production. 본 file은 manual trigger만.
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip-trending]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build trending-watcher
        run: cargo build --release --package trending-watcher

      - name: Run trending-watcher (batch summary)
        id: scan
        run: |
          set -euo pipefail
          mkdir -p /tmp/trending
          cargo run --release --package trending-watcher -- --batch --out /tmp/trending/summary.md
          echo "summary_path=/tmp/trending/summary.md" >> "$GITHUB_OUTPUT"

      - name: Create / update curator review issue
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          filename: /tmp/trending/summary.md
          update_existing: true
          search_existing: open

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Trending watcher 실행 결과"
            echo ""
            echo "- Triggered by: ${{ github.event_name }}"
            echo "- Run ID: ${{ github.run_id }}"
            echo ""
            echo "### Report preview"
            echo ""
            echo '```markdown'
            cat /tmp/trending/summary.md || echo "(빈 결과)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
