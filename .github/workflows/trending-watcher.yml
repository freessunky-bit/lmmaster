# Phase 21'.d вҖ” Trending Watcher cron (DEPRECATED).
#
# вҡ пёҸ DEPRECATED вҖ” productionмқҖ лі„лҸ„ repo `freessunky-bit/lmmaster-trending-watcher`
# (Phase 21'.a мӢ м„Ө, 2026-05-08). ліё prototype workflowлҠ” *мқҙмӨ‘ мӢӨн–ү / Issue мӨ‘ліө мғқм„ұ*
# л°©м§Җ мң„н•ҙ schedule м ңкұ° + workflow_dispatchл§Ң мң м§Җ (manual debugмҡ©).
#
# лі„лҸ„ repo мҡҙмҳҒ м•Ҳм •нҷ” нӣ„ ліё file мһҗмІҙлҘј мӮӯм ң к¶ҢмһҘ (1~2к°ңмӣ” мҡҙмҳҒ нӣ„ v0.4 release мӢң).
#
# м •мұ… (ADR-0059 В§5) вҖ” лі„лҸ„ repoлЎң мқҙлҸҷ:
# https://github.com/freessunky-bit/lmmaster-trending-watcher/.github/workflows/cron.yml

name: Trending Watcher (deprecated вҖ” see lmmaster-trending-watcher repo)

on:
  # schedule cron м ңкұ° вҖ” лі„лҸ„ repoк°Җ production. ліё fileмқҖ manual triggerл§Ң.
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip-trending]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build trending-watcher
        run: cargo build --release --package trending-watcher

      - name: Run trending-watcher (batch summary)
        id: scan
        run: |
          set -euo pipefail
          mkdir -p /tmp/trending
          cargo run --release --package trending-watcher -- --batch --out /tmp/trending/summary.md
          echo "summary_path=/tmp/trending/summary.md" >> "$GITHUB_OUTPUT"

      - name: Create / update curator review issue
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          filename: /tmp/trending/summary.md
          update_existing: true
          search_existing: open

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Trending watcher мӢӨн–ү кІ°кіј"
            echo ""
            echo "- Triggered by: ${{ github.event_name }}"
            echo "- Run ID: ${{ github.run_id }}"
            echo ""
            echo "### Report preview"
            echo ""
            echo '```markdown'
            cat /tmp/trending/summary.md || echo "(л№Ҳ кІ°кіј)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
