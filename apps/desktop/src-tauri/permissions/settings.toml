"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 13'.h.2.e.1 / 13'.h.2.f.1 — 사용자 settings persistence + LlamaCpp 자동 install.

[[permission]]
identifier = "allow-get-llama-server-path"
description = "settings.json에서 llama-server 경로 read."
commands.allow = ["get_llama_server_path"]

[[permission]]
identifier = "allow-set-llama-server-path"
description = "사용자 file picker token resolve + 검증 + settings.json 저장 + env 주입."
commands.allow = ["set_llama_server_path"]

[[permission]]
identifier = "allow-clear-llama-server-path"
description = "settings.json llama_server_path 초기화 + env 제거."
commands.allow = ["clear_llama_server_path"]

[[permission]]
identifier = "allow-install-llama-cpp-runtime"
description = "GPU 자동 감지 + ggerganov/llama.cpp Release 자동 다운로드 + extract + settings 자동 등록."
commands.allow = ["install_llama_cpp_runtime"]

# Phase 8'.c.4 (ADR-0066) — 사내망 노출 토글 + LAN IP 감지.

[[permission]]
identifier = "allow-get-gateway-allow-external"
description = "settings.json에서 게이트웨이 사내망 노출 여부 read."
commands.allow = ["get_gateway_allow_external"]

[[permission]]
identifier = "allow-set-gateway-allow-external"
description = "사내망 노출 토글 — settings.json save + env 갱신. 게이트웨이 재시작 후 적용."
commands.allow = ["set_gateway_allow_external"]

[[permission]]
identifier = "allow-list-lan-addresses"
description = "LAN IP 후보 목록 — RFC 1918 private 범위만. 사내망 호출 URL 자동 표시용."
commands.allow = ["list_lan_addresses"]

# Phase 8'.c.4 (ADR-0066) Q1 helper — 모델 폴더 열기 + 클라우드 내보내기 도우미.

[[permission]]
identifier = "allow-get-models-dir"
description = "LMmaster 모델 폴더 경로 read — UI 표시용 (app_local_data_dir/models)."
commands.allow = ["get_models_dir"]

[[permission]]
identifier = "allow-open-models-dir"
description = "모델 폴더를 OS 파일 탐색기로 열기 (Windows: explorer, macOS: open, Linux: xdg-open). 없으면 생성."
commands.allow = ["open_models_dir"]
