"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 4.5'.b: Knowledge Stack IPC 권한 (workspace 단위 ingest + 검색).

[[permission]]
identifier = "allow-ingest-path"
description = "Ingest a file or directory into a knowledge workspace; streams IngestEvent to caller window."
commands.allow = ["ingest_path"]

[[permission]]
identifier = "allow-cancel-ingest"
description = "Cancel an in-flight ingest by workspace_id (idempotent)."
commands.allow = ["cancel_ingest"]

[[permission]]
identifier = "allow-search-knowledge"
description = "Search a knowledge workspace by text query (sync RPC, top-k cosine)."
commands.allow = ["search_knowledge"]

[[permission]]
identifier = "allow-list-ingests"
description = "List active ingest snapshots (in-memory registry)."
commands.allow = ["list_ingests"]

[[permission]]
identifier = "allow-knowledge-workspace-stats"
description = "Return document and chunk counts for a knowledge workspace."
commands.allow = ["knowledge_workspace_stats"]

# Phase 9'.a — 임베딩 모델 카탈로그 + HuggingFace 다운로드 IPC.

[[permission]]
identifier = "allow-list-embedding-models"
description = "List available embedding models (bge-m3 / kure-v1 / multilingual-e5-small) with download / active state."
commands.allow = ["list_embedding_models"]

[[permission]]
identifier = "allow-set-active-embedding-model"
description = "Switch the active embedding model used by knowledge ingest + search."
commands.allow = ["set_active_embedding_model"]

[[permission]]
identifier = "allow-download-embedding-model"
description = "Download an embedding model from HuggingFace (sha256 verify + atomic rename). Streams DownloadEvent."
commands.allow = ["download_embedding_model"]

[[permission]]
identifier = "allow-cancel-embedding-download"
description = "Cancel an in-flight embedding model download by kind (idempotent)."
commands.allow = ["cancel_embedding_download"]
