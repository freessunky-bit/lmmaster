"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 8'.1: 사용자 향 workspace 관리 IPC (사이드바 WorkspaceSwitcher).
# 단수형 workspace.toml은 fingerprint repair용 — 별도 파일로 분리.

[[permission]]
identifier = "allow-list-workspaces"
description = "List all user workspaces with their metadata."
commands.allow = ["list_workspaces"]

[[permission]]
identifier = "allow-get-active-workspace"
description = "Return the currently active workspace id + metadata."
commands.allow = ["get_active_workspace"]

[[permission]]
identifier = "allow-create-workspace"
description = "Create a new workspace with given name and description."
commands.allow = ["create_workspace"]

[[permission]]
identifier = "allow-rename-workspace"
description = "Rename an existing workspace by id."
commands.allow = ["rename_workspace"]

[[permission]]
identifier = "allow-delete-workspace"
description = "Delete a workspace (last workspace cannot be deleted — backend enforces)."
commands.allow = ["delete_workspace"]

[[permission]]
identifier = "allow-set-active-workspace"
description = "Switch the active workspace; emits workspaces://changed event."
commands.allow = ["set_active_workspace"]
