"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 2'.c.2: 벤치마크 IPC 권한.

[[permission]]
identifier = "allow-start-bench"
description = "Run a 30s bench measurement for a model on a runtime."
commands.allow = ["start_bench"]

[[permission]]
identifier = "allow-cancel-bench"
description = "Cancel an in-flight bench by model_id (idempotent)."
commands.allow = ["cancel_bench"]

[[permission]]
identifier = "allow-get-last-bench-report"
description = "Read the cached BenchReport for a (model, runtime, host) tuple."
commands.allow = ["get_last_bench_report"]

# Phase 13'.b — Diagnostics "최근 측정한 모델 N개" 카드용.

[[permission]]
identifier = "allow-list-recent-bench-reports"
description = "List the most recent N benchmark reports (sorted by mtime) — for Diagnostics."
commands.allow = ["list_recent_bench_reports"]
